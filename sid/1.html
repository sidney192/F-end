<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Sidney</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background-color: #ffffff; 
            color: #1a1a1a;           
            padding: 20px;
            margin-bottom: 25px;      
            border-radius: 15px;      
            width: 100%;
            max-width: 500px;         
            text-align: center;       
        }

        .video-container {
            margin-top: 15px;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        .btn-link { 
            display: block;
            color: #ffffff; 
            background-color: #1a1a1a; 
            text-decoration: none; 
            font-weight: bold; 
            padding: 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1 style="color: white;">não realizei nada</h1>
    </header> 

    <section class="card">
        <p>Um vídeo para distrair você.</p>
        <div class="video-container">
            
            <video controls>
                <source src="videogato.mp4" type="video/mp4">
            </video>

        </div>
    </section>

    <section class="card">
        <a href="index.html" class="btn-link">Voltar para Início</a>
    </section>

</body>
</html>
