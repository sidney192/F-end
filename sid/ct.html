<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <style>
       
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { margin: 0; font-size: 2.5rem; }

        
        .card {
            background-color: #ffffff; 
            color: #1a1a1a;           
            padding: 30px;
            margin-bottom: 25px;      
            border-radius: 15px;      
            width: 100%;
            max-width: 500px;         
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
            text-align: center;       
        }

        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }
        
        .btn-link { 
            display: block;
            color: #ffffff; 
            background-color: #1a1a1a; 
            text-decoration: none; 
            font-weight: bold; 
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-link:hover { 
            background-color: #007BFF; 
            transform: translateY(-2px); 
        }

        footer { margin-top: 20px; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>
    <section class="card">
        <p>celular: 12 99758-2008</p>
    </section>

    <section class="card">
        <P>email: sidneysdineycampos@gmail.com</P>
    </section>

    <section class="card">
        <div class="links-container">
            <a href="index.html" class="btn-link" target="_blank">página inicial</a>
        </div>
    </section>
</body>
</html>
